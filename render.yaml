services:
  - type: worker
    name: solana-wallet-alert
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: HELIUS_API_KEY
        sync: false
      - key: WATCH_WALLET
        sync: false
      - key: MARKETCAP_LIMIT
        value: "5000"
      - key: MIN_LIQUIDITY
        value: "1000"
      - key: POLL_INTERVAL
        value: "30"
